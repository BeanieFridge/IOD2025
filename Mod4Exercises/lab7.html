<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Animation</title>
<style>
div { animation-name: slidein;
animation-duration: 7s;
animation-iteration-count: infinite; }
@keyframes slidein {
from { margin-top: 0%; background-color: blue; }
50% {margin-top: 100%; background-color: green; }
to { margin-top: 0%; background-color: red;}
}
</style>
</head>
<body>
<div style="width: 400px; height: 400px; background-color: aqua;"></div>
</body>
</html>
